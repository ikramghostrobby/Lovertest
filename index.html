<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Tester</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff4d6d;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px 0;
      border:2px solid #ff7eb3;
      border-radius:10px;
      outline:none;
    }

    button{
      background:#ff4d6d;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#e63956;
    }

    #hasil{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#ff4d6d;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>❤️ Love Tester ❤️</h1>

  <input type="text" id="nama1" placeholder="Nama Kamu">
  <input type="text" id="nama2" placeholder="Nama Pasangan">

  <button onclick="cekCinta()">Cek Love</button>

  <div id="hasil"></div>
</div>

<script>
function cekCinta(){
  let nama1 = document.getElementById("nama1").value;
  let nama2 = document.getElementById("nama2").value;

  if(nama1 === "" || nama2 === ""){
    document.getElementById("hasil").innerHTML = "Isi dulu namanya 😭";
    return;
  }

  let persen = Math.floor(Math.random() * 101);

  let pesan = "";

  if(persen > 80){
    pesan = "💖 Cocok banget!";
  } else if(persen > 50){
    pesan = "😍 Lumayan cocok!";
  } else {
    pesan = "😅 Coba lagi besok...";
  }

  document.getElementById("hasil").innerHTML =
    nama1 + " ❤️ " + nama2 + "<br>" +
    persen + "%<br>" + pesan;
}
</script>

</body>
</html>
